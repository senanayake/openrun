[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openrun-core"
version = "0.0.1"
description = "OpenRun coaching engine — VDOT, training zones, periodization, and HRV-based load management."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "AGPL-3.0-or-later" }
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
