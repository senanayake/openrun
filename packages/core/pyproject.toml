[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "openrun-core"
version = "0.1.0"
description = "Evidence-based running coaching engine"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-bdd>=7.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "pytest-benchmark>=4.0",
    "mypy>=1.9",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/openrun"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=openrun --cov-report=term-missing --cov-fail-under=85"
bdd_features_base_dir = "tests/features"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN"]
ignore = ["ANN101", "ANN102"]

[tool.mypy]
strict = true
python_version = "3.12"
